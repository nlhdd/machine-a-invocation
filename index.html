<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="assets/clignoter.png">
	<title>summoner()</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<section id="machine">
		<h1>summoner()</h1>
		<form id="invocation">
			<label for="prenom">Your name: </label>
			<input type="text" id="prenom">
			<label for="creature">Choose your creature: </label>
			<select id="creature">
				<option value="" disabled selected>☺︎</option>
				<option value="Octo-cat">Octo-cat 🐙</option>
				<option value="Dragon-Debug">Dragon-Debug 🐉</option>
				<option value="Unicorn-CSS">Unicorn-CSS 🦄</option>
				<option value="Fox-Refacto">Fox-Refacto 🦊</option>
			</select>
			<button>Summon now!</button>
		</form>
	</section>

	<section id="resultat" class="cache">
		<img id="creature-img" src="" alt="">
		<p id="message"></p>
		<button id="again">Release</button>
	</section>

	<script src="script.js"></script>
</body>
</html>
