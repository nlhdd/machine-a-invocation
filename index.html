<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="assets/etoile.png">
	<title>La Machine à Invocation </title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<section id="machine">
		<h1>La Machine à Invocation</h1>
		<form id="invocation">
			<label for="prenom">Prénom : </label>
			<input type="text" id="prenom">
			<label for="creature">Choisis une créature ! </label>
			<select id="creature">
				<option value="" disabled selected>☺︎</option>
				<option value="chat">Chat-Octo 🐙</option>
				<option value="dragon">Dragon-Debug 🐉</option>
				<option value="licorne">Licorne-CSS 🦄</option>
				<option value="renard">Renard-Refacto 🦊</option>
			</select>
			<button>Invoque-là</button>
		</form>
	</section>

	<section id="resultat" class="cache">
		<p id="message"></p>
	</section>

	<script src="script.js"></script>
</body>
</html>
