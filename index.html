<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="assets/os.png">
	<title>doggoSummoner()</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<section id="machine">
		<h1>doggoSummoner()</h1>
		<img src="assets/niche-verte.png" alt="" class="deco-niche">
		<form id="invocation">
			<label for="prenom">Your name: </label>
			<input type="text" id="prenom" name="prenom">
			<label for="creature">Choose your doggo: </label>
			<select id="creature">
				<option value="" disabled selected>☺</option>
				<option value="golden-retriever">Golden Retriever 🦮</option>
				<option value="akita">Akita 🐕</option>
				<option value="saint-bernard">Saint-Bernard 🐶</option>
				<option value="husky">Husky 🐺</option>
			</select>
			<button>Summon now!</button>
		</form>
	</section>

	<section id="resultat" class="cache">
		<div class="summon-zone">
			<div id="doggo" class="doggo"></div>
			<img id="magic" src="assets/Dark-Bolt.gif" alt="" class="magic cache">
		</div>
		<p id="message"></p>
		<button id="again">Change doggo</button>
	</section>
	<footer class="credits">
		<p>Pixel artists :
			<a href="https://luizmelo.itch.io/pet-dogs-pack" target="_blank" rel="noopener">LuizMelo</a> (doggos) ·
			<a href="https://revouger.itch.io/pet-props" target="_blank" rel="noopener">Revouger</a> (props) ·
			<a href="https://ansimuz.itch.io/gothicvania-magic-pack-9" target="_blank" rel="noopener">ansimuz</a> (magic
			effects)
		</p>
	</footer>
	<script src="script.js"></script>
</body>

</html>
